<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
    }
    h1 { font-size: 14px; text-align: center; margin-bottom: 4px; color: #e94560; }
    .subtitle { text-align: center; font-size: 11px; color: #666; margin-bottom: 12px; }
    .status { text-align: center; font-size: 11px; color: #aaa; margin-top: 8px; min-height: 16px; }
    .error { color: #e94560; }
    #productCard {
      display: none; background: #16213e; border-radius: 8px;
      padding: 12px; margin-top: 10px;
    }
    .product-info { display: flex; flex-direction: column; gap: 8px; }
    .store-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 700; color: #000; width: fit-content;
    }
    .product-thumb {
      width: 100%; max-height: 120px; object-fit: contain;
      border-radius: 6px; background: #fff;
    }
    .product-title {
      font-size: 12px; line-height: 1.3; color: #ccc;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-price { font-size: 16px; font-weight: 700; color: #e94560; }
    .btn {
      width: 100%; padding: 10px; margin-top: 10px; border: none;
      border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn:hover { opacity: 0.85; }
    .btn-story { background: #e94560; color: #fff; display: none; }
    .btn-download { background: #0f3460; color: #fff; display: none; }
    .btn-copy { background: #533483; color: #fff; display: none; }
    .preview { width: 100%; margin-top: 10px; border-radius: 6px; display: none; }
  </style>
</head>
<body>
  <h1>Product Sharer Stories</h1>
  <p class="subtitle">ML · Shopee · Magalu</p>
  <div id="productCard"></div>
  <button class="btn btn-story" id="storyBtn">Gerar Story 9:16</button>
  <img class="preview" id="preview">
  <button class="btn btn-download" id="downloadBtn">Baixar Imagem</button>
  <button class="btn btn-copy" id="copyBtn">Copiar Texto</button>
  <div class="status" id="status"></div>
  <canvas id="canvas" style="display:none"></canvas>
  <script src="qrcode.js"></script>
  <script src="popup.js"></script>
</body>
</html>
